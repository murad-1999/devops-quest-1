apiVersion: v1
kind: Service
metadata:
  name: {{ include "code-quest.fullname" . }}-result
  labels:
    app: result
spec:
  type: {{ .Values.result.service.type }}
  ports:
    - port: {{ .Values.result.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: result
